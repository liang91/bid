# MySQL 数据库配置
mysql:
  host: rm-bp196g3m0q0p273w3to.rwlb.rds.aliyuncs.com
  port: 3306
  user: liang
  password: "Gl135246#"
  database: bid
  charset: utf8mb4

# 爬虫默认参数
crawler:
  # 爬取栏目: dfgg=地方公告, zygg=中央公告
  column: dfgg
  # 请求间隔（秒）
  delay: 1.0
  # 爬取页数（0 表示全部）
  pages: 1
  # 是否爬取详情页
  fetch_detail: false
  # 默认公告类型过滤，null 表示不过滤
  notice_type: "招标公告"

# LLM 解析配置（详情页智能解析）
