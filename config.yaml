  # API 服务商 base URL
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  # API Key（请替换为你的真实密钥）
  api_key: "15568f63-5c45-4462-b8aa-d9a8e6a33212"
  # 模型名称
  model: "doubao-seed-character-251128"
  # 请求超时（秒）
  timeout: 60
  # 最大重试次数
  max_retries: 2
  # 单次请求最大 token 数
  max_tokens: 131072
